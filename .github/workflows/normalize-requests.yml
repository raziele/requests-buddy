name: Normalize Requests

on:
  push:
    branches:
      - 'ingest/**'
    paths:
      - 'raw_emails/**'
  workflow_dispatch:
    inputs:
      run_folder:
        description: 'Timestamp folder inside raw_emails/ (e.g. 20260307-120000)'
        required: true
        type: string
      branch:
        description: 'Branch to check out (defaults to ingest/<run_folder>)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: normalize-${{ github.ref }}
  cancel-in-progress: false

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Derive run parameters
        id: params
        run: |
          if [ -n "${{ inputs.run_folder }}" ]; then
            echo "run_folder=${{ inputs.run_folder }}" >> "$GITHUB_OUTPUT"
            BRANCH="${{ inputs.branch }}"
            echo "branch=${BRANCH:-ingest/${{ inputs.run_folder }}}" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${{ github.ref_name }}"
            echo "run_folder=${BRANCH#ingest/}" >> "$GITHUB_OUTPUT"
            echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          fi

      # PAT required: GITHUB_TOKEN is not permitted to create/approve PRs in this repo.
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.params.outputs.branch }}
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          curl -fsSL https://cursor.com/install -o /tmp/cursor-install.sh
          echo "8b28450c32f41590b8dd1c9c94a358f7a76330e182fab067732b0c1ca453a04f  /tmp/cursor-install.sh" | sha256sum -c -
          bash /tmp/cursor-install.sh
          uv sync

      - name: Configure git
        run: |
          git config user.name "requests-buddy[bot]"
          git config user.email "requests-buddy[bot]@users.noreply.github.com"

      - name: Run normalize
        id: normalize
        env:
          CURSOR_API_KEY: ${{ secrets.CURSOR_API_KEY }}
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: >
          uv run python scripts/normalize_requests.py
          --run-folder "${{ steps.params.outputs.run_folder }}"
          --branch "${{ steps.params.outputs.branch }}"

      - name: Create Pull Request
        if: steps.normalize.outputs.pr_title != ''
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          BASE_BRANCH="${{ github.event.repository.default_branch }}"
          git fetch origin "$BASE_BRANCH"
          gh pr create \
            --title "${{ steps.normalize.outputs.pr_title }}" \
            --body-file .github_pr_body.txt \
            --base "$BASE_BRANCH" \
            --head ${{ steps.params.outputs.branch }}
