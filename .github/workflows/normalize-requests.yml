name: Normalize Requests

on:
  push:
    branches:
      - 'ingest/**'
    paths:
      - 'raw_emails/**'
  workflow_dispatch:
    inputs:
      run_folder:
        description: 'Timestamp folder inside raw_emails/ (e.g. 20260307-120000)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Derive run parameters
        id: params
        run: |
          if [ -n "${{ inputs.run_folder }}" ]; then
            echo "run_folder=${{ inputs.run_folder }}" >> "$GITHUB_OUTPUT"
            echo "branch=ingest/${{ inputs.run_folder }}" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${{ github.ref_name }}"
            echo "run_folder=${BRANCH#ingest/}" >> "$GITHUB_OUTPUT"
            echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.params.outputs.branch }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          npm install -g opencode-ai
          uv sync

      - name: Configure git
        run: |
          git config user.name "requests-buddy[bot]"
          git config user.email "requests-buddy[bot]@users.noreply.github.com"

      - name: Run normalize
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: >
          uv run python scripts/normalize_requests.py
          --run-folder "${{ steps.params.outputs.run_folder }}"
          --branch "${{ steps.params.outputs.branch }}"
