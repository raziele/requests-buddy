name: Normalize Requests

on:
  push:
    branches:
      - 'ingest/**'
    paths:
      - 'raw_emails/**'
  workflow_dispatch:
    inputs:
      run_folder:
        description: 'Timestamp folder inside raw_emails/ (e.g. 20260307-120000)'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  normalize:
    runs-on: ubuntu-latest
    steps:
      - name: Derive run parameters
        id: params
        run: |
          if [ -n "${{ inputs.run_folder }}" ]; then
            echo "run_folder=${{ inputs.run_folder }}" >> "$GITHUB_OUTPUT"
            echo "branch=ingest/${{ inputs.run_folder }}" >> "$GITHUB_OUTPUT"
          else
            BRANCH="${{ github.ref_name }}"
            echo "run_folder=${BRANCH#ingest/}" >> "$GITHUB_OUTPUT"
            echo "branch=${BRANCH}" >> "$GITHUB_OUTPUT"
          fi

      # PAT required: GITHUB_TOKEN is not permitted to create/approve PRs in this repo.
      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.params.outputs.branch }}
          token: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          npm install -g opencode-ai
          uv sync

      - name: Configure git
        run: |
          git config user.name "requests-buddy[bot]"
          git config user.email "requests-buddy[bot]@users.noreply.github.com"

      - name: Inject OPENROUTER_MODEL into opencode.json
        env:
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || secrets.OPENROUTER_MODEL }}
        run: uv run python scripts/inject_opencode_model.py

      - name: Run normalize
        id: normalize
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENROUTER_MODEL: ${{ vars.OPENROUTER_MODEL || secrets.OPENROUTER_MODEL }}
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: >
          uv run python scripts/normalize_requests.py
          --run-folder "${{ steps.params.outputs.run_folder }}"
          --branch "${{ steps.params.outputs.branch }}"

      - name: Create Pull Request
        if: steps.normalize.outputs.pr_title != ''
        env:
          GH_TOKEN: ${{ secrets.REPO_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          BASE_BRANCH="${{ github.event.repository.default_branch }}"
          git fetch origin "$BASE_BRANCH"
          pr_url=$(gh pr create \
            --title "${{ steps.normalize.outputs.pr_title }}" \
            --body-file .github_pr_body.txt \
            --base "$BASE_BRANCH" \
            --head ${{ steps.params.outputs.branch }})
          echo "pr_url=$pr_url" >> "$GITHUB_OUTPUT"
          gh pr merge "$pr_url" --squash --delete-branch
