name: Sync NotebookLM

on:
  push:
    branches: [main]
    paths: ['requests/**']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: |
          uv sync
          uv run playwright install chromium

      - name: Restore NotebookLM credentials
        env:
          NOTEBOOKLM_CREDS: ${{ secrets.NOTEBOOKLM_CREDENTIALS }}
        run: |
          if [ -z "$NOTEBOOKLM_CREDS" ]; then
            echo "::error::NOTEBOOKLM_CREDENTIALS secret is empty. Run scripts/setup.sh to configure."
            exit 1
          fi
          mkdir -p ~/.notebooklm
          echo "$NOTEBOOKLM_CREDS" | base64 -d > ~/.notebooklm/storage_state.json

      - name: Configure git
        run: |
          git config user.name "requests-buddy[bot]"
          git config user.email "requests-buddy[bot]@users.noreply.github.com"

      - name: Run sync
        env:
          NOTEBOOKLM_NOTEBOOK_ID: ${{ secrets.NOTEBOOKLM_NOTEBOOK_ID }}
        run: uv run python scripts/sync_notebooklm.py
