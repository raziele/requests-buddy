<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>תודה על תרומתכם למאגר בקשות החירום</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      font-family: 'Google Sans', 'Segoe UI', Roboto, Arial, sans-serif;
    }
    .email-wrapper {
      max-width: 560px;
      margin: 0 auto;
      padding: 32px 24px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      padding-bottom: 20px;
      border-bottom: 1px solid #e8e8e8;
    }
    .header-icon {
      width: 28px;
      height: 28px;
      flex-shrink: 0;
    }
    .header-icon svg {
      width: 28px;
      height: 28px;
    }
    .header-text {
      font-size: 14px;
      color: #5f6368;
      font-weight: 400;
    }
    .content {
      color: #1f1f1f;
      line-height: 1.6;
      font-size: 15px;
    }
    .greeting {
      font-size: 15px;
      margin: 0 0 8px 0;
    }
    .thank-you {
      color: #1f1f1f;
      margin: 0 0 24px 0;
    }
    .cta-section {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      margin-bottom: 32px;
    }
    .button-primary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: #6750a4;
      color: #ffffff !important;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 100px;
      font-weight: 500;
      font-size: 14px;
    }
    .button-secondary {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background-color: #f3e8ff;
      color: #6750a4 !important;
      text-decoration: none;
      padding: 10px 20px;
      border-radius: 100px;
      font-weight: 500;
      font-size: 14px;
    }
    .button-primary svg,
    .button-secondary svg {
      width: 16px;
      height: 16px;
    }
    .features-section {
      color: #5f6368;
      font-size: 14px;
      margin-bottom: 32px;
    }
    .features-title {
      margin: 0 0 12px 0;
    }
    .features-list {
      margin: 0;
      padding: 0;
      list-style: none;
    }
    .features-list li {
      padding: 4px 0;
      padding-right: 16px;
      position: relative;
    }
    .features-list li::before {
      content: "·";
      position: absolute;
      right: 0;
      color: #6750a4;
      font-weight: bold;
    }
    .signature {
      color: #5f6368;
      font-size: 14px;
      padding-top: 24px;
      border-top: 1px solid #e8e8e8;
    }
    .signature p {
      margin: 2px 0;
    }
    .brand-name {
      color: #6750a4;
      font-weight: 500;
    }
  </style>
</head>
<body dir="rtl" style="direction: rtl; text-align: right;">
  <div class="email-wrapper" dir="rtl" style="direction: rtl; text-align: right;">
    <!-- Content -->
    <div class="content" dir="rtl" style="direction: rtl; text-align: right;">
      <!-- U+202B RTL embedding - survives paste as text, may force RTL -->
      <p class="greeting" dir="rtl" style="direction: rtl; text-align: right;">&#x202B;היי,</p>
      <p class="thank-you" dir="rtl" style="direction: rtl; text-align: right;">תודה רבה על תרומתכם למאגר בקשות החירום!</p>
      <p class="thank-you" dir="rtl" style="direction: rtl; text-align: right;">מוזמנים להיכנס:</p>
      
      <!-- CTAs Above the Fold -->
      <div class="cta-section" dir="rtl" style="direction: rtl; text-align: right;">
        <a href="https://notebooklm.google.com/notebook/b7e8aad8-24df-4f8f-837d-fc426033979a" class="button-primary" dir="rtl" style="direction: rtl; text-align: right;">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M19 3H5C3.9 3 3 3.9 3 5V19C3 20.1 3.9 21 5 21H19C20.1 21 21 20.1 21 19V5C21 3.9 20.1 3 19 3ZM19 19H5V5H19V19ZM7 7H17V9H7V7ZM7 11H17V13H7V11ZM7 15H13V17H7V15Z"/>
          </svg>
          כניסה למאגר
        </a>
        <a href="https://chat.whatsapp.com/EIbHNyvwq7DABe4xGtKxSH?mode=gi_t" class="button-secondary" dir="rtl" style="direction: rtl; text-align: right;">
          💬 דברו איתנו בוואטסאפ
        </a>
      </div>
      
      <!-- Features -->
      <div class="features-section" dir="rtl" style="direction: rtl; text-align: right;">
        <p class="features-title" dir="rtl" style="direction: rtl; text-align: right;">במאגר ניתן לשוחח עם סוכן AI שמכיר את כל הבקשות:</p>
        <ul class="features-list" dir="rtl" style="direction: rtl; text-align: right;">
          <li dir="rtl" style="direction: rtl; text-align: right;">לחפש בקשות בשפה חופשית</li>
          <li dir="rtl" style="direction: rtl; text-align: right;">לקבל פרטים נוספים על כל בקשה</li>
          <li dir="rtl" style="direction: rtl; text-align: right;">למצוא את אנשי הקשר להמשך שיתוף פעולה</li>
        </ul>
      </div>
      
      <!-- Signature -->
      <div class="signature" dir="rtl" style="direction: rtl; text-align: right;">
        <p dir="rtl" style="direction: rtl; text-align: right;">שלכם,</p>
        <p class="brand-name" dir="rtl" style="direction: rtl; text-align: right;">טק באדיז</p>
      </div>
    </div>
  </div>
</body>
</html>
